name: Deploy To Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy by SSH (username + password)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: 22
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          envs: DEPLOY_APP_DIR,DEPLOY_BRANCH
          script: |
            set -e
            if [ -z "$DEPLOY_APP_DIR" ]; then
              DEPLOY_APP_DIR=/home/jrtt-server/jrtt-tool-server
            fi
            if [ -z "$DEPLOY_BRANCH" ]; then
              DEPLOY_BRANCH=main
            fi

            if [ ! -d "$DEPLOY_APP_DIR/.git" ]; then
              echo "Git repo not found in $DEPLOY_APP_DIR"
              echo "Please clone your repo on server first."
              exit 1
            fi

            cd "$DEPLOY_APP_DIR"
            # 网络抖动时，git over https 容易出现 GnuTLS EOF，做兼容配置 + 重试
            git config --local http.version HTTP/1.1
            git config --local http.postBuffer 524288000

            n=0
            until [ "$n" -ge 3 ]
            do
              git fetch --all --prune && break
              n=$((n+1))
              echo "git fetch failed, retry $n/3..."
              sleep 5
            done

            if [ "$n" -ge 3 ]; then
              echo "git fetch --all failed after retries, fallback to shallow fetch"
              git fetch origin "$DEPLOY_BRANCH" --depth=1
            fi

            git reset --hard "origin/$DEPLOY_BRANCH"

            docker compose down || true
            docker compose up -d --build
            docker compose ps
        env:
          DEPLOY_APP_DIR: /home/jrtt-server/jrtt-tool-server
          DEPLOY_BRANCH: main
