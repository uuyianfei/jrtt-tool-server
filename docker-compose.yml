version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jrtt-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 容器内 Selenium 路径默认值；如 .env 已设置则以 .env 为准
      CHROMEDRIVER_PATH: ${CHROMEDRIVER_PATH:-/usr/bin/chromedriver}
      CHROME_BINARY_PATH: ${CHROME_BINARY_PATH:-/usr/bin/chromium}
    ports:
      - "5000:5000"
