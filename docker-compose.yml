services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jrtt-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      CRAWL_JOB_ENABLED: "false"
      AUTHOR_COLLECT_JOB_ENABLED: "false"
      AUTHOR_ARTICLES_JOB_ENABLED: "false"
      CLEANUP_JOB_ENABLED: "false"
      CRAWL_HEADLESS: "true"
      CHROMEDRIVER_PATH: ${CHROMEDRIVER_PATH:-/usr/bin/chromedriver}
      CHROME_BINARY_PATH: ${CHROME_BINARY_PATH:-/usr/bin/chromium}
    ports:
      - "5000:5000"

  fast-crawler:
    build:
      context: .
      dockerfile: Dockerfile.fast
    container_name: jrtt-fast-crawler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      FAST_CRAWL_ENABLED: "true"
      FAST_CRAWL_INTERVAL_SECONDS: ${FAST_CRAWL_INTERVAL_SECONDS:-120}
      FAST_CRAWL_CHANNELS: ${FAST_CRAWL_CHANNELS:-__all__,news_hot,news_tech,news_finance,news_entertainment,news_sports,news_society,news_car,news_health,news_military,news_world,news_travel,news_history}
      FAST_CRAWL_CONCURRENCY: ${FAST_CRAWL_CONCURRENCY:-10}
      FAST_CRAWL_MAX_HOURS: ${FAST_CRAWL_MAX_HOURS:-24}
      FAST_CRAWL_MAX_PAGES_PER_CHANNEL: ${FAST_CRAWL_MAX_PAGES_PER_CHANNEL:-50}
      FAST_CRAWL_REQUEST_DELAY: ${FAST_CRAWL_REQUEST_DELAY:-0.3}
      CRAWL_JOB_ENABLED: "false"
      AUTHOR_COLLECT_JOB_ENABLED: "false"
      AUTHOR_ARTICLES_JOB_ENABLED: "false"
      CLEANUP_JOB_ENABLED: "true"
      PYTHONUNBUFFERED: "1"

  metrics-reconcile:
    build:
      context: .
      dockerfile: Dockerfile.fast
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PYTHONUNBUFFERED: "1"
      CRAWL_HEADLESS: "false"
      CHROMEDRIVER_PATH: ${CHROMEDRIVER_PATH:-/usr/bin/chromedriver}
      CHROME_BINARY_PATH: ${CHROME_BINARY_PATH:-/usr/bin/chromium}
      METRICS_RECONCILE_ENABLED: "true"
      METRICS_RECONCILE_INTERVAL_SECONDS: ${METRICS_RECONCILE_INTERVAL_SECONDS:-60}
      METRICS_RECONCILE_BATCH_SIZE: ${METRICS_RECONCILE_BATCH_SIZE:-30}
      METRICS_RECONCILE_MAX_HOURS: ${METRICS_RECONCILE_MAX_HOURS:-24}
      METRICS_RECONCILE_REQUEST_DELAY: ${METRICS_RECONCILE_REQUEST_DELAY:-0.25}
    command: >
      sh -c 'xvfb-run -a -s "-screen 0 1920x1080x24"
      python tools/reconcile_article_metrics.py
      --loop
      --interval-seconds ${METRICS_RECONCILE_INTERVAL_SECONDS:-60}
      --batch-size ${METRICS_RECONCILE_BATCH_SIZE:-30}
      --max-hours ${METRICS_RECONCILE_MAX_HOURS:-24}
      --request-delay ${METRICS_RECONCILE_REQUEST_DELAY:-0.25}'

  metrics-reconcile-checked:
    build:
      context: .
      dockerfile: Dockerfile.fast
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PYTHONUNBUFFERED: "1"
      METRICS_RECONCILE_CHECKED_INTERVAL_SECONDS: ${METRICS_RECONCILE_CHECKED_INTERVAL_SECONDS:-60}
      METRICS_RECONCILE_CHECKED_BATCH_SIZE: ${METRICS_RECONCILE_CHECKED_BATCH_SIZE:-30}
      METRICS_RECONCILE_CHECKED_MAX_HOURS: ${METRICS_RECONCILE_CHECKED_MAX_HOURS:-24}
      METRICS_RECONCILE_CHECKED_REQUEST_DELAY: ${METRICS_RECONCILE_CHECKED_REQUEST_DELAY:-0.25}
    command: >
      sh -c 'python tools/reconcile_article_metrics.py
      --mode checked-refresh
      --loop
      --interval-seconds ${METRICS_RECONCILE_CHECKED_INTERVAL_SECONDS:-60}
      --batch-size ${METRICS_RECONCILE_CHECKED_BATCH_SIZE:-30}
      --max-hours ${METRICS_RECONCILE_CHECKED_MAX_HOURS:-24}
      --request-delay ${METRICS_RECONCILE_CHECKED_REQUEST_DELAY:-0.25}'
