  fast-crawler:
    build:
      context: .
      dockerfile: Dockerfile.fast
    container_name: jrtt-fast-crawler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      FAST_CRAWL_ENABLED: "true"
      FAST_CRAWL_INTERVAL_SECONDS: ${FAST_CRAWL_INTERVAL_SECONDS:-300}
      FAST_CRAWL_CHANNELS: ${FAST_CRAWL_CHANNELS:-__all__,news_hot,news_tech,news_finance,news_entertainment,news_sports}
      FAST_CRAWL_CONCURRENCY: ${FAST_CRAWL_CONCURRENCY:-10}
      FAST_CRAWL_MAX_HOURS: ${FAST_CRAWL_MAX_HOURS:-24}
      FAST_CRAWL_MAX_PAGES_PER_CHANNEL: ${FAST_CRAWL_MAX_PAGES_PER_CHANNEL:-50}
      FAST_CRAWL_REQUEST_DELAY: ${FAST_CRAWL_REQUEST_DELAY:-0.3}
      CRAWL_JOB_ENABLED: "false"
      AUTHOR_COLLECT_JOB_ENABLED: "false"
      AUTHOR_ARTICLES_JOB_ENABLED: "false"
      CLEANUP_JOB_ENABLED: "true"
      PYTHONUNBUFFERED: "1"

