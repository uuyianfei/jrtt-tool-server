services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jrtt-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      CRAWL_JOB_ENABLED: "false"
      AUTHOR_COLLECT_JOB_ENABLED: "false"
      AUTHOR_ARTICLES_JOB_ENABLED: "false"
      CLEANUP_JOB_ENABLED: "false"
      # 容器内 Selenium 路径默认值；如 .env 已设置则以 .env 为准
      CHROMEDRIVER_PATH: ${CHROMEDRIVER_PATH:-/usr/bin/chromedriver}
      CHROME_BINARY_PATH: ${CHROME_BINARY_PATH:-/usr/bin/chromium}
    ports:
      - "5000:5000"

  author-collect:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jrtt-author-collect
    restart: unless-stopped
    command:
      [
        "sh",
        "-lc",
        "Xvfb :99 -screen 0 1920x1080x24 -nolisten tcp & export DISPLAY=:99; exec python -u run_crawler.py",
      ]
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      CRAWL_JOB_ENABLED: "false"
      AUTHOR_COLLECT_JOB_ENABLED: "true"
      AUTHOR_ARTICLES_JOB_ENABLED: "false"
      CLEANUP_JOB_ENABLED: "false"
      WORKER_ROLE: "author-collect"
      CHROMEDRIVER_PATH: ${CHROMEDRIVER_PATH:-/usr/bin/chromedriver}
      CHROME_BINARY_PATH: ${CHROME_BINARY_PATH:-/usr/bin/chromium}
      CRAWL_HEADLESS: "false"
      PYTHONUNBUFFERED: "1"
      DISPLAY: ":99"

  author-articles:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jrtt-author-articles
    restart: unless-stopped
    command:
      [
        "sh",
        "-lc",
        "Xvfb :99 -screen 0 1920x1080x24 -nolisten tcp & export DISPLAY=:99; exec python -u run_crawler.py",
      ]
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      CRAWL_JOB_ENABLED: "false"
      AUTHOR_COLLECT_JOB_ENABLED: "false"
      AUTHOR_ARTICLES_JOB_ENABLED: "true"
      CLEANUP_JOB_ENABLED: "true"
      WORKER_ROLE: "author-articles"
      CHROMEDRIVER_PATH: ${CHROMEDRIVER_PATH:-/usr/bin/chromedriver}
      CHROME_BINARY_PATH: ${CHROME_BINARY_PATH:-/usr/bin/chromium}
      CRAWL_HEADLESS: "false"
      PYTHONUNBUFFERED: "1"
      DISPLAY: ":99"

  import-authors:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jrtt-import-authors
    restart: "no"
    command: ["python", "-u", "import_author_sources.py", "--file", "good_authors.json"]
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      CHROMEDRIVER_PATH: ${CHROMEDRIVER_PATH:-/usr/bin/chromedriver}
      CHROME_BINARY_PATH: ${CHROME_BINARY_PATH:-/usr/bin/chromium}
      CRAWL_HEADLESS: "true"
      PYTHONUNBUFFERED: "1"
